<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>职业知识库</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --surface2: #F0EEE9;
  --border: #E5E2DA;
  --text: #1A1A1A;
  --text2: #6B6860;
  --text3: #A8A49C;
  --accent: #2C4A6E;
  --accent2: #4A7FA5;
  --gold: #C8922A;
  --gold-bg: rgba(200,146,42,0.1);
  --green: #3A7D5A;
  --green-bg: rgba(58,125,90,0.1);
  --purple: #5A4A8A;
  --purple-bg: rgba(90,74,138,0.1);
  --red: #B84040;
  --red-bg: rgba(184,64,64,0.08);
  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
}
body { font-family: -apple-system, "PingFang SC", "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }

/* ── Layout ── */
.app { display: grid; grid-template-rows: 56px 1fr; grid-template-columns: 220px 1fr; min-height: 100vh; }
.topbar { grid-column: 1/-1; background: var(--accent); display: flex; align-items: center; padding: 0 24px; gap: 16px; }
.topbar-logo { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
.topbar-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-left: 2px; }
.topbar-spacer { flex: 1; }
.topbar-date { font-size: 12px; color: rgba(255,255,255,0.6); }

.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; border-radius: 0; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(44,74,110,0.07); color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.nav-section { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--text3); padding: 16px 20px 6px; text-transform: uppercase; }

.main { overflow-y: auto; padding: 28px 32px; }

/* ── Cards ── */
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; box-shadow: var(--shadow); }
.card + .card { margin-top: 16px; }
.card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

/* ── Page headers ── */
.page-header { margin-bottom: 24px; }
.page-title { font-size: 22px; font-weight: 700; color: var(--text); }
.page-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

/* ── Form elements ── */
input, textarea, select { font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; outline: none; transition: border 0.15s; width: 100%; }
input:focus, textarea:focus, select:focus { border-color: var(--accent2); background: #fff; }
textarea { resize: vertical; line-height: 1.7; }
label { font-size: 12px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-row { margin-bottom: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1e3a5c; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(184,64,64,0.2); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ── Tags ── */
.tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.tag-remove { font-size: 14px; line-height: 1; opacity: 0.6; }
.tag-remove:hover { opacity: 1; }
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

/* ── Entry card ── */
.entry-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); transition: box-shadow 0.15s; }
.entry-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.entry-card + .entry-card { margin-top: 12px; }
.entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.entry-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
.entry-date { font-size: 11px; color: var(--text3); white-space: nowrap; margin-left: 12px; }
.entry-content { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 10px; white-space: pre-wrap; }
.entry-content mark { background: #FFF3A8; padding: 0 2px; border-radius: 2px; }
.read-more { color: var(--accent2); font-weight: 600; font-size: 12px; white-space: nowrap; }
#viewContent mark { background: #FFF3A8; padding: 0 2px; border-radius: 2px; }

/* Rich text editor */
.rte-toolbar { display: flex; gap: 4px; flex-wrap: wrap; padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; align-items: center; }
.rte-btn { min-width: 32px; height: 30px; border: 1px solid transparent; background: transparent; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; color: var(--text); display: flex; align-items: center; justify-content: center; padding: 0 8px; transition: all 0.1s; }
.rte-btn:hover { background: #fff; border-color: var(--border); }
.rte-btn.active { background: var(--accent); color: #fff; }
.rte-btn b { font-weight: 800; }
.rte-btn u { text-decoration: underline; }
.rte-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.rte-select { height: 30px; border: 1px solid var(--border); border-radius: 6px; background: #fff; font-size: 12px; font-family: inherit; color: var(--text); padding: 0 6px; cursor: pointer; outline: none; width: auto; }
.rte-editor { min-height: 140px; border: 1px solid var(--border); border-radius: 0 0 8px 8px; padding: 12px 14px; font-size: 14px; line-height: 1.8; color: var(--text); background: var(--bg); outline: none; overflow-y: auto; }
.rte-editor:focus { border-color: var(--accent2); background: #fff; }
.rte-editor.rte-dragover { border: 2px dashed var(--accent); background: rgba(44,74,110,0.04); }
.rte-hint { font-size: 11px; color: var(--text3); margin-top: 6px; }
.rte-editor:empty::before { content: attr(data-placeholder); color: var(--text3); }
.rte-editor mark { background: #FFF3A8; padding: 0 2px; border-radius: 2px; }
.rte-editor.small { min-height: 180px; }
.rte-editor ul, .rte-editor ol, #viewContent ul, #viewContent ol { padding-left: 24px; margin: 8px 0; }
.rte-editor li, #viewContent li { margin-bottom: 4px; line-height: 1.8; }
.rte-editor img, #viewContent img, .entry-content img { max-width: 100%; border-radius: 8px; margin: 8px 0; display: block; }
.entry-content img { max-height: 120px; width: auto; }
.entry-footer { display: flex; align-items: center; justify-content: space-between; }
.entry-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
.entry-card:hover .entry-actions { opacity: 1; }

/* ── Tree (archive) ── */
.tree-folder { margin-bottom: 4px; }
.tree-folder-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; border-radius: 8px; font-weight: 600; font-size: 13px; color: var(--text); transition: background 0.15s; user-select: none; }
.tree-folder-header:hover { background: var(--surface2); }
.tree-chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.tree-chevron.open { transform: rotate(90deg); }
.tree-children { padding-left: 20px; display: none; }
.tree-children.open { display: block; }
.tree-leaf { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; border-radius: 8px; font-size: 13px; color: var(--text2); transition: all 0.15s; }
.tree-leaf:hover { background: var(--surface2); color: var(--text); }
.tree-leaf.active { background: rgba(44,74,110,0.08); color: var(--accent); font-weight: 600; }
.tree-count { font-size: 11px; color: var(--text3); margin-left: auto; }

/* ── Archive layout ── */
.archive-layout { display: grid; grid-template-columns: 240px 1fr; gap: 20px; }
.archive-sidebar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; height: fit-content; box-shadow: var(--shadow); }
.archive-content { min-width: 0; }

/* ── Search & filter ── */
.search-bar { position: relative; }
.search-bar input { padding-left: 36px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

/* ── Mind map ── */
/* Library / file drop */
.drop-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); }
.drop-zone:hover { border-color: var(--accent2); background: rgba(74,127,165,0.03); }
.drop-zone.dragover { border-color: var(--accent); background: rgba(44,74,110,0.06); transform: scale(1.01); }
.drop-icon { font-size: 36px; margin-bottom: 10px; }
.drop-title { font-size: 15px; font-weight: 600; color: var(--text); }
.drop-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
.file-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); transition: box-shadow 0.15s; display: flex; flex-direction: column; align-items: center; text-align: center; }
.file-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.1); }
.file-card-icon { font-size: 34px; margin-bottom: 8px; }
.file-card-name { font-size: 13px; font-weight: 600; color: var(--text); word-break: break-all; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.file-card-meta { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
.file-card-actions { display: flex; gap: 6px; margin-top: auto; }

/* ── Skill radar ── */
#radar-canvas { display: block; margin: 0 auto; }
.radar-legend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 16px; }
.radar-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.radar-legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* ── Stats ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; box-shadow: var(--shadow); }
.stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Tag manager ── */
.tag-manage-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.tag-manage-row:last-child { border-bottom: none; }
.color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.color-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.color-swatch.selected { border-color: var(--text); transform: scale(1.15); }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(2px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 14px; padding: 28px; width: 100%; max-width: 560px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* ── Empty state ── */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ── Divider ── */
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; }
  .sidebar { grid-row: 2; flex-direction: row; overflow-x: auto; padding: 8px; border-right: none; border-bottom: 1px solid var(--border); }
  .nav-section { display: none; }
  .nav-item { padding: 8px 14px; border-left: none; border-bottom: 3px solid transparent; white-space: nowrap; }
  .nav-item.active { border-bottom-color: var(--accent); border-left-color: transparent; }
  .main { padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .archive-layout { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Topbar -->
  <div class="topbar">
    <div>
      <span class="topbar-logo">职业知识库</span>
      <span class="topbar-sub">/ Knowledge Base</span>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-date" id="topbarDate"></div>
  </div>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="nav-section">记录</div>
    <div class="nav-item active" onclick="showPage('record')" id="nav-record">
      <span class="nav-icon">✏️</span>今日记录
    </div>
    <div class="nav-section">查阅</div>
    <div class="nav-item" onclick="showPage('archive')" id="nav-archive">
      <span class="nav-icon">🗂️</span>知识档案
    </div>
    <div class="nav-item" onclick="showPage('library')" id="nav-library">
      <span class="nav-icon">📎</span>资料库
    </div>
    <div class="nav-item" onclick="showPage('radar')" id="nav-radar">
      <span class="nav-icon">📡</span>能力雷达
    </div>
    <div class="nav-section">设置</div>
    <div class="nav-item" onclick="showPage('tags')" id="nav-tags">
      <span class="nav-icon">🏷️</span>标签管理
    </div>
  </nav>

  <!-- Main -->
  <main class="main" id="mainContent"></main>
</div>

<!-- Entry modal (edit) -->
<div class="modal-overlay" id="entryModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">编辑记录</div>
    <div class="form-row"><label>标题</label><input id="editTitle" placeholder="这次学到的核心是什么？" /></div>
    <div class="form-row">
      <label>内容 / 感悟</label>
      <div class="rte-toolbar">
        <button type="button" class="rte-btn" title="加粗" onmousedown="event.preventDefault()" onclick="rteCmd('editContentEditor','bold')"><b>B</b></button>
        <button type="button" class="rte-btn" title="下划线" onmousedown="event.preventDefault()" onclick="rteCmd('editContentEditor','underline')"><u>U</u></button>
        <button type="button" class="rte-btn" title="高亮" onmousedown="event.preventDefault()" onclick="rteHighlight('editContentEditor')">🖍️</button>
        <div class="rte-divider"></div>
        <select class="rte-select" title="字号" onmousedown="event.stopPropagation()" onchange="rteFontSize('editContentEditor',this.value); this.selectedIndex=0">
          <option value="">字号</option>
          <option value="2">小</option>
          <option value="3">正常</option>
          <option value="5">大</option>
          <option value="6">特大</option>
        </select>
        <div class="rte-divider"></div>
        <button type="button" class="rte-btn" title="有序列表" onmousedown="event.preventDefault()" onclick="rteCmd('editContentEditor','insertOrderedList')">1.</button>
        <button type="button" class="rte-btn" title="项目符号" onmousedown="event.preventDefault()" onclick="rteCmd('editContentEditor','insertUnorderedList')">•</button>
        <div class="rte-divider"></div>
        <button type="button" class="rte-btn" title="插入图片" onmousedown="event.preventDefault()" onclick="rtePickImage('editContentEditor')">🖼️</button>
        <div class="rte-divider"></div>
        <button type="button" class="rte-btn" title="清除格式" onmousedown="event.preventDefault()" onclick="rteCmd('editContentEditor','removeFormat')">🧹</button>
      </div>
      <div id="editContentEditor" class="rte-editor small" contenteditable="true" data-placeholder="详细记录..."></div>
      <div class="rte-hint">💡 图片可直接拖入或粘贴 · 输入「1. 」或「- 」加空格自动生成列表</div>
    </div>
    <div class="form-row">
      <label>标签</label>
      <div id="editTagPicker" class="tags-row" style="margin-top:6px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- View full entry modal -->
<div class="modal-overlay" id="viewModal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div class="modal-title" id="viewTitle" style="margin-bottom:0"></div>
      <span style="font-size:12px;color:var(--text3);white-space:nowrap;margin-left:12px" id="viewDate"></span>
    </div>
    <div id="viewTags" class="tags-row" style="margin-bottom:14px"></div>
    <div id="viewContent" class="rte-editor" contenteditable="false" style="min-height:auto;border:none;background:transparent;padding:0;font-size:14px;line-height:1.8;color:var(--text)"></div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="deleteFromView()">删除</button>
      <button class="btn btn-secondary" onclick="closeViewModal()">关闭</button>
      <button class="btn btn-primary" onclick="editFromView()">编辑</button>
    </div>
  </div>
</div>

<script>
// ── Storage key ───────────────────────────────────────────
const SK = "kb-v1";

// ── Default tags ──────────────────────────────────────────
const DEFAULT_TAGS = [
  { id:"t1",  name:"合同管理",    color:"#2C4A6E" },
  { id:"t2",  name:"索赔",        color:"#B84040" },
  { id:"t3",  name:"FIDIC",       color:"#5A4A8A" },
  { id:"t4",  name:"光伏/新能源", color:"#3A7D5A" },
  { id:"t5",  name:"商务英语",    color:"#C8922A" },
  { id:"t6",  name:"谈判技巧",    color:"#4A7FA5" },
  { id:"t7",  name:"项目管理",    color:"#7A5A3A" },
  { id:"t8",  name:"法律条款",    color:"#6A3A6A" },
  { id:"t9",  name:"行业知识",    color:"#2A6A5A" },
  { id:"t10", name:"工作感悟",    color:"#8A6A2A" },
];

const TAG_COLORS = ["#2C4A6E","#B84040","#5A4A8A","#3A7D5A","#C8922A","#4A7FA5","#7A5A3A","#6A3A6A","#2A6A5A","#8A6A2A","#4A5A8A","#6A4A2A"];

// ── State ─────────────────────────────────────────────────
let S = load();
let currentPage = "record";
let editingId = null;
let archiveFilter = { year: null, month: null, tag: null, search: "" };


function load() {
  try {
    const r = localStorage.getItem(SK);
    const d = r ? JSON.parse(r) : {};
    if (!d.entries) d.entries = [];
    if (!d.tags) d.tags = DEFAULT_TAGS;
    if (!d.draftTitle) d.draftTitle = "";
    if (!d.draftContent) d.draftContent = "";
    if (!d.draftTags) d.draftTags = [];
    return d;
  } catch { return { entries:[], tags:DEFAULT_TAGS, draftTitle:"", draftContent:"", draftTags:[] }; }
}
function save() { try { localStorage.setItem(SK, JSON.stringify(S)); } catch {} }

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDate(s) { const p=s.split('-'); return `${p[0]}年${parseInt(p[1])}月${parseInt(p[2])}日`; }
function getTag(id) { return S.tags.find(t=>t.id===id); }
function tagStyle(id) { const t=getTag(id); if(!t) return ''; return `background:${t.color}22;color:${t.color};border:1px solid ${t.color}44`; }

// ── Page routing ──────────────────────────────────────────
function showPage(p) {
  currentPage = p;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-'+p)?.classList.add('active');
  const main = document.getElementById('mainContent');

// ── Image insertion (compressed base64) ───────────────────
let _rteImageTarget = null;
function rtePickImage(editorId) {
  _rteImageTarget = editorId;
  let input = document.getElementById('rteImageInput');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.id = 'rteImageInput';
    input.accept = 'image/*';
    input.style.display = 'none';
    input.onchange = handleRteImage;
    document.body.appendChild(input);
  }
  input.value = '';
  input.click();
}
async function handleRteImage(e) {
  const file = e.target.files[0];
  if (!file || !_rteImageTarget) return;
  await insertImageIntoEditor(_rteImageTarget, file);
  _rteImageTarget = null;
}
function compressImage(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── Auto-list + drag/paste image ──────────────────────────
function setupAutoList(editorId) {
  const ed = document.getElementById(editorId);
  if (!ed || ed.dataset.autolist) return;
  ed.dataset.autolist = '1';

  // Auto-list on typing "1. " or "- "
  ed.addEventListener('input', function(e) {
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const node = sel.anchorNode;
    if (!node || node.nodeType !== 3) return;
    const text = node.textContent;
    let p = node.parentNode;
    while (p && p !== ed) { if (p.tagName === 'LI') return; p = p.parentNode; }

    if (/^1\.\s$/.test(text)) {
      node.textContent = '';
      document.execCommand('insertOrderedList', false, null);
      rteSync(editorId);
    } else if (/^[-*]\s$/.test(text)) {
      node.textContent = '';
      document.execCommand('insertUnorderedList', false, null);
      rteSync(editorId);
    }
  });

  // Drag & drop images
  ed.addEventListener('dragover', e => {
    if (e.dataTransfer.types.includes('Files')) {
      e.preventDefault();
      ed.classList.add('rte-dragover');
    }
  });
  ed.addEventListener('dragleave', () => ed.classList.remove('rte-dragover'));
  ed.addEventListener('drop', async e => {
    ed.classList.remove('rte-dragover');
    const files = Array.from(e.dataTransfer.files || []).filter(f => f.type.startsWith('image/'));
    if (!files.length) return;
    e.preventDefault();
    // Place cursor at drop point if possible
    ed.focus();
    for (const file of files) {
      await insertImageIntoEditor(editorId, file);
    }
  });

  // Paste images (screenshots, copied images)
  ed.addEventListener('paste', async e => {
    const items = Array.from(e.clipboardData?.items || []);
    const imgItem = items.find(i => i.type.startsWith('image/'));
    if (!imgItem) return; // let normal text paste happen
    e.preventDefault();
    const file = imgItem.getAsFile();
    if (file) await insertImageIntoEditor(editorId, file);
  });
}

async function insertImageIntoEditor(editorId, file) {
  const ed = document.getElementById(editorId);
  if (!ed) return;
  try {
    const dataUrl = await compressImage(file, 1000, 0.8);
    ed.focus();
    document.execCommand('insertHTML', false, `<img src="${dataUrl}" style="max-width:100%;border-radius:8px;margin:8px 0" /><br>`);
    rteSync(editorId);
  } catch (err) {
    alert('图片插入失败，请换一张试试');
  }
}

// ── Page 2: Archive ───────────────────────────────────────
function renderArchive(el) {
  const years = {};
  S.entries.forEach(e => {
    const [y,m] = e.date.split('-');
    if (!years[y]) years[y]={};
    if (!years[y][m]) years[y][m]=0;
    years[y][m]++;
  });

  let treeHTML = '';
  Object.keys(years).sort((a,b)=>b-a).forEach(y => {
    const yOpen = archiveFilter.year===y;
    treeHTML += `<div class="tree-folder">
      <div class="tree-folder-header" onclick="setFilter('year','${y}')">
        <span class="tree-chevron ${yOpen?'open':''}">›</span>
        <span>📁 ${y}年</span>
        <span class="tree-count">${Object.values(years[y]).reduce((a,b)=>a+b,0)}</span>
      </div>
      <div class="tree-children ${yOpen?'open':''}">`;
    Object.keys(years[y]).sort((a,b)=>b-a).forEach(m => {
      const active = archiveFilter.year===y && archiveFilter.month===m;
      treeHTML += `<div class="tree-leaf ${active?'active':''}" onclick="setFilter('month','${m}','${y}')">
        <span>📄 ${parseInt(m)}月</span><span class="tree-count">${years[y][m]}</span></div>`;
    });
    treeHTML += `</div></div>`;
  });

  // Tag filter tree
  treeHTML += `<hr class="divider"><div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">按标签筛选</div>`;
  S.tags.forEach(t => {
    const cnt = S.entries.filter(e=>e.tags.includes(t.id)).length;
    if (!cnt) return;
    treeHTML += `<div class="tree-leaf ${archiveFilter.tag===t.id?'active':''}" onclick="setFilter('tag','${t.id}')">
      <span class="color-dot" style="background:${t.color}"></span>${t.name}<span class="tree-count">${cnt}</span></div>`;
  });

  if (Object.keys(years).length || archiveFilter.year || archiveFilter.tag) {
    treeHTML += `<div style="margin-top:12px"><button class="btn btn-secondary btn-sm" onclick="clearFilter()">清除筛选</button></div>`;
  }

  // Filter entries
  let filtered = [...S.entries];
  if (archiveFilter.year) filtered = filtered.filter(e=>e.date.startsWith(archiveFilter.year));
  if (archiveFilter.month) filtered = filtered.filter(e=>e.date.split('-')[1]===archiveFilter.month);
  if (archiveFilter.tag) filtered = filtered.filter(e=>e.tags.includes(archiveFilter.tag));
  if (archiveFilter.search) {
    const q = archiveFilter.search.toLowerCase();
    filtered = filtered.filter(e=>e.title.toLowerCase().includes(q)||stripHtml(e.content).toLowerCase().includes(q));
  }
  filtered.sort((a,b)=>b.date.localeCompare(a.date));

  // Determine current archive scope label for PDF export
  let scopeLabel = '全部记录';
  if (archiveFilter.year && archiveFilter.month) scopeLabel = `${archiveFilter.year}年${parseInt(archiveFilter.month)}月`;
  else if (archiveFilter.year) scopeLabel = `${archiveFilter.year}年`;
  else if (archiveFilter.tag) scopeLabel = getTag(archiveFilter.tag)?.name || '标签';

  el.innerHTML = `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="page-title">知识档案</div>
        <div class="page-sub">共 ${S.entries.length} 条记录 · 当前查看：${scopeLabel}（${filtered.length}条）</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="exportArchivePDF()">🖨️ 导出当前为 PDF</button>
    </div>
    <div class="archive-layout">
      <div class="archive-sidebar">
        <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)">📁 浏览</div>
        ${treeHTML}
      </div>
      <div class="archive-content">
        <div class="search-bar" style="margin-bottom:14px">
          <span class="search-icon">🔍</span>
          <input id="archiveSearchInput" placeholder="搜索标题或内容..." value="${escHtml(archiveFilter.search)}" oninput="onSearchInput(this.value)" />
        </div>
        <div id="archiveResults">
        ${filtered.length ? filtered.map(e=>makeEntryCard(e).outerHTML).join('') : '<div class="empty"><div class="empty-icon">🗂️</div><div class="empty-text">没有符合条件的记录</div></div>'}
        </div>
      </div>
    </div>`;

  // Re-attach event listeners for entry cards
  el.querySelectorAll('.entry-clickable').forEach(elm => {
    elm.onclick = () => openView(elm.dataset.id);
  });
  el.querySelectorAll('.entry-edit-btn').forEach(btn => {
    btn.onclick = (ev) => { ev.stopPropagation(); openEdit(btn.dataset.id); };
  });
  el.querySelectorAll('.entry-del-btn').forEach(btn => {
    btn.onclick = (ev) => { ev.stopPropagation(); deleteEntry(btn.dataset.id); };
  });
}

// Compute filtered entries based on current archiveFilter
function getFilteredEntries() {
  let filtered = [...S.entries];
  if (archiveFilter.year) filtered = filtered.filter(e=>e.date.startsWith(archiveFilter.year));
  if (archiveFilter.month) filtered = filtered.filter(e=>e.date.split('-')[1]===archiveFilter.month);
  if (archiveFilter.tag) filtered = filtered.filter(e=>e.tags.includes(archiveFilter.tag));
  if (archiveFilter.search) {
    const q = archiveFilter.search.toLowerCase();
    filtered = filtered.filter(e=>e.title.toLowerCase().includes(q)||stripHtml(e.content).toLowerCase().includes(q));
  }
  filtered.sort((a,b)=>b.date.localeCompare(a.date));
  return filtered;
}

// Search input: only update results list, keep input focused
function onSearchInput(v) {
  archiveFilter.search = v;
  const results = document.getElementById('archiveResults');
  if (!results) return;
  const filtered = getFilteredEntries();
  results.innerHTML = filtered.length
    ? filtered.map(e=>makeEntryCard(e).outerHTML).join('')
    : '<div class="empty"><div class="empty-icon">🗂️</div><div class="empty-text">没有符合条件的记录</div></div>';
  results.querySelectorAll('.entry-clickable').forEach(elm => { elm.onclick = () => openView(elm.dataset.id); });
  results.querySelectorAll('.entry-edit-btn').forEach(btn => { btn.onclick = (ev) => { ev.stopPropagation(); openEdit(btn.dataset.id); }; });
  results.querySelectorAll('.entry-del-btn').forEach(btn => { btn.onclick = (ev) => { ev.stopPropagation(); deleteEntry(btn.dataset.id); }; });
}

function setFilter(type, val, year) {
  if (type==='year') { archiveFilter.year = archiveFilter.year===val?null:val; archiveFilter.month=null; archiveFilter.tag=null; }
  else if (type==='month') { archiveFilter.year=year; archiveFilter.month=archiveFilter.month===val?null:val; archiveFilter.tag=null; }
  else if (type==='tag') { archiveFilter.tag=archiveFilter.tag===val?null:val; archiveFilter.year=null; archiveFilter.month=null; }
  showPage('archive');
}
function clearFilter() { archiveFilter={year:null,month:null,tag:null,search:""}; showPage('archive'); }
function setSearch(v) { archiveFilter.search=v; showPage('archive'); }
// (search now handled by onSearchInput to preserve input focus)

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  return tmp.textContent || tmp.innerText || '';
}
function contentPreview(html) {
  const plain = stripHtml(html);
  const hasImg = /<img/i.test(html || '');
  if (plain.length <= 200) {
    return (html || '') + (hasImg && !plain.trim() ? '' : '');
  }
  // For long content, show truncated plain text + image hint
  return escHtml(plain.slice(0,200)) + '…' + (hasImg ? ' <span class="read-more">🖼️ 含图片</span>' : '');
}

function makeEntryCard(e) {
  const div = document.createElement('div');
  div.className = 'entry-card';
  const tagsHTML = e.tags.map(id=>{
    const t=getTag(id); if(!t) return '';
    return `<span class="tag" style="${tagStyle(id)}">${t.name}</span>`;
  }).join('');
  const plain = stripHtml(e.content);
  const isTruncated = plain.length > 200;
  div.innerHTML = `
    <div class="entry-header entry-clickable" data-id="${e.id}" style="cursor:pointer">
      <div class="entry-title">${escHtml(e.title)}</div>
      <div class="entry-date">${fmtDate(e.date)}</div>
    </div>
    <div class="entry-content entry-clickable" data-id="${e.id}" style="cursor:pointer">${contentPreview(e.content)}${isTruncated?' <span class="read-more">查看全文 ›</span>':''}</div>
    <div class="entry-footer">
      <div class="tags-row">${tagsHTML}</div>
      <div class="entry-actions">
        <button class="btn btn-secondary btn-sm entry-edit-btn" data-id="${e.id}">编辑</button>
        <button class="btn btn-danger btn-sm entry-del-btn" data-id="${e.id}">删除</button>
      </div>
    </div>`;
  div.querySelectorAll('.entry-clickable').forEach(elm => { elm.onclick = () => openView(e.id); });
  div.querySelector('.entry-edit-btn').onclick = (ev) => { ev.stopPropagation(); openEdit(e.id); };
  div.querySelector('.entry-del-btn').onclick = (ev) => { ev.stopPropagation(); deleteEntry(e.id); };
  return div;
}

  loadFileList();
}

let fileSearchQuery = '';

function fileIcon(type, name) {
  const ext = (name.split('.').pop()||'').toLowerCase();
  if (type.startsWith('image/')) return '🖼️';
  if (ext==='pdf') return '📕';
  if (['doc','docx'].includes(ext)) return '📘';
  if (['xls','xlsx','csv'].includes(ext)) return '📗';
  if (['ppt','pptx'].includes(ext)) return '📙';
  if (['zip','rar','7z'].includes(ext)) return '🗜️';
  if (['txt','md'].includes(ext)) return '📄';
  return '📎';
}
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

async function handleFiles(fileList) {
  for (const file of fileList) {
    if (file.size > 25 * 1048576) {
      alert(`文件「${file.name}」超过 25MB，跳过。大文件建议存在云盘。`);
      continue;
    }
    const buffer = await file.arrayBuffer();
    const record = {
      id: genId(),
      name: file.name,
      type: file.type || 'application/octet-stream',
      size: file.size,
      date: today(),
      blob: buffer,
    };
    await idbPut(record);
  }
  loadFileList();
}

async function loadFileList() {
  const grid = document.getElementById('fileGrid');

  let files = await idbGetAll();

async function downloadFile(id) {

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = f.name; a.click();

}

}

// ── IndexedDB helpers ─────────────────────────────────────
let _db = null;
function idbOpen() {
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db);
    const req = indexedDB.open('kb-files', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id' });
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = e => reject(e);
  });
}
async function idbPut(record) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('files', 'readwrite');
    tx.objectStore('files').put(record);
    tx.oncomplete = res; tx.onerror = rej;
  });
}
async function idbGet(id) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const req = db.transaction('files', 'readonly').objectStore('files').get(id);
    req.onsuccess = () => res(req.result); req.onerror = rej;
  });
}
async function idbGetAll() {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const req = db.transaction('files', 'readonly').objectStore('files').getAll();
    req.onsuccess = () => res(req.result || []); req.onerror = rej;
  });
}
async function idbDelete(id) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('files', 'readwrite');
    tx.objectStore('files').delete(id);
    tx.oncomplete = res; tx.onerror = rej;
  });
}

function renderRadar(el) {
  // Calculate score per tag: entries count + recency bonus
  const tagScores={};
  const now=new Date();
  S.tags.forEach(t=>{ tagScores[t.id]=0; });
  S.entries.forEach(e=>{
    const daysAgo=(now-new Date(e.date))/86400000;
    const recency=Math.max(0,1-daysAgo/180);
    e.tags.forEach(tid=>{ if(tagScores[tid]!==undefined) tagScores[tid]+= 1+recency; });
  });

  // Normalize 0-100
  const maxScore=Math.max(...Object.values(tagScores),1);
  const scores=S.tags.map(t=>({ tag:t, score:Math.round(tagScores[t.id]/maxScore*100) }));

      <div class="stat-card"><div class="stat-num">${scores.filter(s=>s.score>0).length}</div><div class="stat-label">涉及领域</div></div>
      <div class="stat-card"><div class="stat-num">${sorted[0]?.tag.name||'—'}</div><div class="stat-label">最强领域</div></div>
      <div class="stat-card"><div class="stat-num">${sorted.filter(s=>s.score>0).slice(-1)[0]?.tag.name||'—'}</div><div class="stat-label">待加强</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <div class="card-title">📡 雷达图</div>
        <canvas id="radar-canvas" width="320" height="320"></canvas>
        <div class="radar-legend" id="radarLegend"></div>
      </div>
      <div class="card">
        <div class="card-title">📊 领域排名</div>
        ${sorted.map((s,i)=>`
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="display:flex;align-items:center;gap:6px">
                <span style="width:8px;height:8px;border-radius:50%;background:${s.tag.color};display:inline-block"></span>
                <span style="font-size:13px;font-weight:${i<3?700:400};color:${i<3?'var(--text)':'var(--text2)'}">${s.tag.name}</span>
              </span>
              <span style="font-size:12px;color:var(--text3)">${s.score}%</span>
            </div>
            <div class="prog-bar-bg">
              <div style="width:${s.score}%;height:7px;border-radius:4px;background:${s.tag.color};transition:width 0.6s"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;

  setTimeout(()=>drawRadar(scores), 50);
}

function drawRadar(scores) {
  const canvas=document.getElementById('radar-canvas'); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=320,H=320,cx=160,cy=160,r=120;
  ctx.clearRect(0,0,W,H);

  const active=scores.filter(s=>s.score>0);
  if (!active.length) { ctx.fillStyle='#AAA'; ctx.font='14px system-ui'; ctx.textAlign='center'; ctx.fillText('还没有记录', cx, cy); return; }

  const n=active.length;
  const step=2*Math.PI/n;
  const levels=[20,40,60,80,100];

  // Grid
  levels.forEach(lv=>{
    ctx.beginPath();
    active.forEach((_,i)=>{ const a=step*i-Math.PI/2; const x=cx+Math.cos(a)*r*lv/100,y=cy+Math.sin(a)*r*lv/100; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.closePath(); ctx.strokeStyle='#E5E2DA'; ctx.lineWidth=1; ctx.stroke();
  });

  // Axes
  active.forEach((_,i)=>{ const a=step*i-Math.PI/2; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r); ctx.strokeStyle='#E5E2DA'; ctx.lineWidth=1; ctx.stroke(); });

  // Data polygon
  ctx.beginPath();
  active.forEach((s,i)=>{ const a=step*i-Math.PI/2; const x=cx+Math.cos(a)*r*s.score/100,y=cy+Math.sin(a)*r*s.score/100; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.closePath(); ctx.fillStyle='rgba(44,74,110,0.15)'; ctx.fill();
  ctx.strokeStyle='#2C4A6E'; ctx.lineWidth=2; ctx.stroke();

  // Dots & labels
  active.forEach((s,i)=>{
    const a=step*i-Math.PI/2;
    const x=cx+Math.cos(a)*r*s.score/100,y=cy+Math.sin(a)*r*s.score/100;
    ctx.beginPath(); ctx.arc(x,y,5,0,2*Math.PI);
    ctx.fillStyle=s.tag.color; ctx.fill();
    const lx=cx+Math.cos(a)*(r+22),ly=cy+Math.sin(a)*(r+22);
    ctx.fillStyle='#444'; ctx.font='11px system-ui'; ctx.textAlign='center';
    ctx.fillText(s.tag.name.length>5?s.tag.name.slice(0,5)+'…':s.tag.name, lx, ly+4);
  });

  // Legend
  const leg=document.getElementById('radarLegend'); if(!leg) return;
  leg.innerHTML=active.map(s=>`<div class="radar-legend-item"><div class="radar-legend-dot" style="background:${s.tag.color}"></div>${s.tag.name} ${s.score}%</div>`).join('');
}

async function exportAllData() {
  const files = await idbGetAll();
  // Convert file buffers to base64 for JSON serialization
  const filesB64 = files.map(f => ({
    id: f.id, name: f.name, type: f.type, size: f.size, date: f.date,
    blob: arrayBufferToBase64(f.blob)
  }));
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    knowledge: { entries: S.entries, tags: S.tags },
    files: filesB64,
  };
  const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `知识库备份_${today()}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function importAllData(fileInput) {
  const file = fileInput.files[0]; if (!file) return;
  if (!confirm('导入将覆盖当前所有记录、标签和文件，确认继续？')) { fileInput.value=''; return; }
  try {
    const text = await file.text();
    const payload = JSON.parse(text);
    if (payload.knowledge) {
      S.entries = payload.knowledge.entries || [];
      S.tags = payload.knowledge.tags || DEFAULT_TAGS;
      save();
    }
    if (payload.files) {
      // Clear existing files then import
      const existing = await idbGetAll();
      for (const f of existing) await idbDelete(f.id);
      for (const f of payload.files) {
        await idbPut({ id:f.id, name:f.name, type:f.type, size:f.size, date:f.date, blob: base64ToArrayBuffer(f.blob) });
      }
    }
    alert('导入成功！');
    showPage('record');
  } catch (err) {
    alert('导入失败，文件格式可能不正确');
  }
  fileInput.value='';
}

function arrayBufferToBase64(buffer) {
  let binary = '';
  const bytes = new Uint8Array(buffer);
  const chunk = 8192;
  for (let i=0; i<bytes.length; i+=chunk) {
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+chunk));
  }
  return btoa(binary);
}
function base64ToArrayBuffer(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}
